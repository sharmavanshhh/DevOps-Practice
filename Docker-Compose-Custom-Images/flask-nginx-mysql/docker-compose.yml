version: '3.9'

services:
  frontend:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
  
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
  
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABSE: testdb
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: