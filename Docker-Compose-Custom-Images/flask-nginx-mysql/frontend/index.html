<!DOCTYPE html>
<html>
<head>
  <title>Docker App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      background: #4facfe;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #00c6ff;
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Enter Your Name:</h2>
    <input id="name" type="text" placeholder="Your name" />
    <br>
    <button onclick="sendData()">Submit</button>
  </div>

  <script>
    function sendData() {
      const name = document.getElementById("name").value;

      fetch("http://localhost:5000/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
      })
      .then(res => res.text())
      .then(data => alert(data));
    }
  </script>

</body>
</html>
